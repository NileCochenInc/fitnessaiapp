name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Tests run in parallel ─────────────────────────────────────────────

  test-frontend:
    name: Test — Frontend/Backend (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: front-and-back-end/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: ./front-and-back-end

      - name: Run unit tests
        run: pnpm test:unit
        working-directory: ./front-and-back-end

      - name: Run frontend tests
        run: pnpm test:frontend
        working-directory: ./front-and-back-end

  test-admin:
    name: Test — Admin Dashboard (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./admin-dash

      - name: Run tests
        run: dotnet test Admin-Dash.Tests/Admin-Dash.Tests.csproj --verbosity normal
        working-directory: ./admin-dash

  test-data-tool:
    name: Test — Data Tool (Java/Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -B
        working-directory: ./data-tool

  # ── Build all images after all tests pass ─────────────────────────────

  build:
    name: Build & Push Docker Images
    needs: [test-frontend, test-admin, test-data-tool]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push server
        uses: docker/build-push-action@v5
        with:
          context: ./front-and-back-end
          file: ./front-and-back-end/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fitnessaiapp:latest
            ${{ secrets.DOCKER_USERNAME }}/fitnessaiapp:sha-${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
          provenance: false

      - name: Build & push AI service
        uses: docker/build-push-action@v5
        with:
          context: ./ai
          file: ./ai/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fitnessaiapp-ai:latest
            ${{ secrets.DOCKER_USERNAME }}/fitnessaiapp-ai:sha-${{ github.sha }}
          cache-from: type=gha,scope=ai
          cache-to: type=gha,mode=max,scope=ai
          provenance: false

      - name: Build & push admin dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./admin-dash
          file: ./admin-dash/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fitnessaiapp-admin-dash:latest
            ${{ secrets.DOCKER_USERNAME }}/fitnessaiapp-admin-dash:sha-${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin
          provenance: false

      - name: Build & push data tool
        uses: docker/build-push-action@v5
        with:
          context: ./data-tool
          file: ./data-tool/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fitnessaiapp-data-tool:latest
            ${{ secrets.DOCKER_USERNAME }}/fitnessaiapp-data-tool:sha-${{ github.sha }}
          cache-from: type=gha,scope=data-tool
          cache-to: type=gha,mode=max,scope=data-tool
          provenance: false

  # ── Deploy to Azure ───────────────────────────────────────────────────

  deploy:
    name: Deploy to Azure Container Apps
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy server
        run: |
          az containerapp update \
            --name fitness-ai-app \
            --resource-group Fitness-AI-App \
            --image ${{ secrets.DOCKER_USERNAME }}/fitnessaiapp:sha-${{ github.sha }} \
            --set-env-vars "DEPLOYMENT_VERSION=${{ github.run_number }}"

      - name: Deploy AI service
        run: |
          az containerapp update \
            --name fitness-ai-app-ai \
            --resource-group Fitness-AI-App \
            --image ${{ secrets.DOCKER_USERNAME }}/fitnessaiapp-ai:sha-${{ github.sha }} \
            --set-env-vars "DEPLOYMENT_VERSION=${{ github.run_number }}"

      - name: Deploy admin dashboard
        run: |
          az containerapp update \
            --name fitness-ai-app-admin \
            --resource-group Fitness-AI-App \
            --image ${{ secrets.DOCKER_USERNAME }}/fitnessaiapp-admin-dash:sha-${{ github.sha }} \
            --set-env-vars "DEPLOYMENT_VERSION=${{ github.run_number }}"

      - name: Deploy data tool
        run: |
          az containerapp update \
            --name fitness-ai-app-data-tool \
            --resource-group Fitness-AI-App \
            --image ${{ secrets.DOCKER_USERNAME }}/fitnessaiapp-data-tool:sha-${{ github.sha }} \
            --set-env-vars "DEPLOYMENT_VERSION=${{ github.run_number }}"

  # ── Post-deploy smoke tests ───────────────────────────────────────────

  smoke-test:
    name: Smoke Tests — Production E2E
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: front-and-back-end/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: ./front-and-back-end

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: ./front-and-back-end

      - name: Run E2E smoke tests against production
        run: |
          npx playwright test \
            e2e/cross-container.spec.ts \
            e2e/chat.spec.ts \
            e2e/admin.spec.ts \
            --project=chromium --reporter=list
        working-directory: ./front-and-back-end
        env:
          PRODUCTION_TEST: '1'
          BASE_URL: https://fitnessaiapp.duckdns.org
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: front-and-back-end/playwright-report/
          retention-days: 7
