apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: fitnessapp
data:
  01_FitnessDatabaseV1.sql: |
    
    CREATE EXTENSION IF NOT EXISTS vector;
    
    CREATE TABLE users (
        id BIGSERIAL PRIMARY KEY,
        username VARCHAR(255) NOT NULL,
        email VARCHAR(255) NOT NULL UNIQUE,
        goal TEXT NOT NULL,
        password_hash TEXT,
        google_id VARCHAR(255) UNIQUE,
        provider VARCHAR(50)
    );
    
    --period of athletic work
    CREATE TABLE workouts (
        id BIGSERIAL PRIMARY KEY,
        workout_date DATE NOT NULL,
        user_id BIGINT NOT NULL,
        workout_kind VARCHAR(50), -- strength, rowing, mixed, unknown
        embeddings VECTOR(1024),
        workout_text TEXT,
        CONSTRAINT fk_workouts_user
            FOREIGN KEY (user_id) REFERENCES users(id)
            ON DELETE CASCADE
    );
    
    --type of athletic work eg squats
    CREATE TABLE exercises (
        id BIGSERIAL PRIMARY KEY,
        is_global BOOLEAN NOT NULL,
        name VARCHAR(255) NOT NULL,
        user_id BIGINT, -- null if is global is true
        CONSTRAINT fk_exercises_user
            FOREIGN KEY (user_id) REFERENCES users(id)
            ON DELETE CASCADE,
        CONSTRAINT chk_global_user_id --enforce is_global and user_id mutual exclusivity
            CHECK (
                (is_global = TRUE AND user_id IS NULL)
                OR
                (is_global = FALSE AND user_id IS NOT NULL)
            ),
        CONSTRAINT uniq_global_name
            UNIQUE (name, is_global)  -- ensures no duplicate global names
    );
    
    --instance of predefined exercise done on workout
    CREATE TABLE workout_exercises (
        id BIGSERIAL PRIMARY KEY,
        exercise_id BIGINT NOT NULL,
        workout_id BIGINT NOT NULL,
        note TEXT,
        embeddings VECTOR(1024),
        exercise_text TEXT,
        CONSTRAINT fk_workout_exercises_exercise
            FOREIGN KEY (exercise_id) REFERENCES exercises(id)
            ON DELETE CASCADE,
        CONSTRAINT fk_workout_exercises_workout
            FOREIGN KEY (workout_id) REFERENCES workouts(id)
            ON DELETE CASCADE,
        CONSTRAINT workout_exercise_unique
            UNIQUE (exercise_id, workout_id)
    );
    
    --instance exercise done eg "set"
    CREATE TABLE entries (
        id BIGSERIAL PRIMARY KEY,
        workout_exercise_id BIGINT NOT NULL,
        entry_index BIGINT NOT NULL, -- what order entries happen in
        CONSTRAINT fk_entries_workout_exercise
            FOREIGN KEY (workout_exercise_id) REFERENCES workout_exercises(id)
            ON DELETE CASCADE
    );
    
    --user created metrics
    CREATE TABLE metric_definitions (
        id BIGSERIAL PRIMARY KEY,
        user_id BIGINT,
        key VARCHAR(100) NOT NULL,
        is_global BOOLEAN NOT NULL,
        display_name VARCHAR(255),
        value_type VARCHAR(20),
        default_unit VARCHAR(50),
        CONSTRAINT fk_user_metric_definitions_user
            FOREIGN KEY (user_id) REFERENCES users(id)
            ON DELETE CASCADE,
        CONSTRAINT chk_global_user_id --enforce is_global and user_id mutual exclusivity
            CHECK (
                (is_global = TRUE AND user_id IS NULL)
                OR
                (is_global = FALSE AND user_id IS NOT NULL)
            ),
        CONSTRAINT uniq_global_key
            UNIQUE (key, is_global)  -- ensures no duplicate global names
    );
    
    --data about entry eg "weight per set"
    CREATE TABLE entry_metrics (
        id BIGSERIAL PRIMARY KEY,
        entry_id BIGINT NOT NULL,
        metric_id BIGINT NOT NULL,
        value_number DOUBLE PRECISION,
        value_text TEXT,
        unit VARCHAR(50),
        CONSTRAINT fk_entry_metrics_entry
            FOREIGN KEY (entry_id) REFERENCES entries(id)
            ON DELETE CASCADE,
        CONSTRAINT fk_entry_metrics_metric
            FOREIGN KEY (metric_id) REFERENCES metric_definitions(id)
            ON DELETE CASCADE,
        CONSTRAINT entry_metrics_definitions_uniq
            UNIQUE (entry_id, metric_id)
    );
    
    --N to N metric_definitions to exercises
    CREATE TABLE metric_exercise_junction (
        id BIGSERIAL PRIMARY KEY,
        metric_id BIGINT NOT NULL,
        exercise_id BIGINT NOT NULL,
        CONSTRAINT fk_junction_metric
            FOREIGN KEY (metric_id) REFERENCES metric_definitions(id)
            ON DELETE CASCADE,
        CONSTRAINT fk_junction_exercise
            FOREIGN KEY (exercise_id) REFERENCES exercises(id)
            ON DELETE CASCADE,
        CONSTRAINT uniq_metric_exercise
            UNIQUE (metric_id, exercise_id)
    );

  02_GlobalDataV2.sql: |
    -- Insert global exercises and capture IDs
    WITH inserted_exercises AS (
        INSERT INTO exercises (is_global, name, user_id)
        VALUES
            (TRUE, 'Bench Press', NULL),
            (TRUE, 'Squat', NULL),
            (TRUE, 'Deadlift', NULL),
            (TRUE, 'Treadmill', NULL),
            (TRUE, 'Rowing Machine', NULL),
            (TRUE, 'Cable row', NULL),
            (TRUE, 'Dumbbell Hammer curls', NULL),
            (TRUE, 'Dumbbell flat bench press', NULL),
            (TRUE, 'Biceps curl machine', NULL),
            (TRUE, 'Cable triceps push down', NULL),
            (TRUE, 'Cable lat raise', NULL),
            (TRUE, 'Cable kneeling crunch', NULL),
            (TRUE, 'Tricep dips', NULL),
            (TRUE, 'Chin-ups', NULL),
            (TRUE, 'Focus curl', NULL),
            (TRUE, 'Incline dumbbell curl', NULL),
            (TRUE, 'Pec fly machine', NULL),
            (TRUE, 'Dumbbell lat raise', NULL),
            (TRUE, 'Long lever plank', NULL),
            (TRUE, 'Smith machine hip thrust', NULL),
            (TRUE, 'Calf raise', NULL),
            (TRUE, 'Easy grip curl', NULL),
            (TRUE, 'Incline dumbbell bench press', NULL),
            (TRUE, 'Cable oblique twist', NULL),
            (TRUE, 'Angled leg press machine', NULL),
            (TRUE, 'Outer thigh machine', NULL),
            (TRUE, 'Inner thigh machine', NULL),
            (TRUE, 'Prone leg curl machine', NULL),
            (TRUE, 'Cable crunch', NULL)
        RETURNING id, name
    ),
    
    -- Insert global metrics and capture IDs
    inserted_metrics AS (
        INSERT INTO metric_definitions (user_id, key, is_global, display_name, value_type, default_unit)
        VALUES
            (NULL, 'weight', TRUE, 'Weight', 'number', 'lbs'),
            (NULL, 'reps', TRUE, 'Repetitions', 'number', NULL),
            (NULL, 'duration', TRUE, 'Duration', 'number', 'minutes'),
            (NULL, 'distance', TRUE, 'Distance', 'number', 'km'),
            (NULL, 'speed', TRUE, 'Speed', 'number', 'km/h'),
            (NULL, 'stroke_rate', TRUE, 'Stroke Rate', 'number', 'strokes/min')
        RETURNING id, key
    )
    
    -- Insert into junction table by joining
    INSERT INTO metric_exercise_junction (metric_id, exercise_id)
    SELECT m.id AS metric_id, e.id AS exercise_id
    FROM inserted_exercises e
    JOIN inserted_metrics m
        ON ( (e.name = 'Bench Press' AND m.key IN ('weight','reps'))
          OR (e.name = 'Squat' AND m.key IN ('weight','reps'))
          OR (e.name = 'Deadlift' AND m.key IN ('weight','reps'))
          OR (e.name = 'Cable row' AND m.key IN ('weight','reps'))
          OR (e.name = 'Dumbbell Hammer curls' AND m.key IN ('weight','reps'))
          OR (e.name = 'Dumbbell flat bench press' AND m.key IN ('weight','reps'))
          OR (e.name = 'Biceps curl machine' AND m.key IN ('weight','reps'))
          OR (e.name = 'Cable triceps push down' AND m.key IN ('weight','reps'))
          OR (e.name = 'Cable lat raise' AND m.key IN ('weight','reps'))
          OR (e.name = 'Cable kneeling crunch' AND m.key IN ('weight','reps'))
          OR (e.name = 'Tricep dips' AND m.key IN ('reps'))
          OR (e.name = 'Chin-ups' AND m.key IN ('reps'))
          OR (e.name = 'Focus curl' AND m.key IN ('weight','reps'))
          OR (e.name = 'Incline dumbbell curl' AND m.key IN ('weight','reps'))
          OR (e.name = 'Pec fly machine' AND m.key IN ('weight','reps'))
          OR (e.name = 'Dumbbell lat raise' AND m.key IN ('weight','reps'))
          OR (e.name = 'Smith machine hip thrust' AND m.key IN ('weight','reps'))
          OR (e.name = 'Calf raise' AND m.key IN ('weight','reps'))
          OR (e.name = 'Easy grip curl' AND m.key IN ('weight','reps'))
          OR (e.name = 'Incline dumbbell bench press' AND m.key IN ('weight','reps'))
          OR (e.name = 'Cable oblique twist' AND m.key IN ('weight','reps'))
          OR (e.name = 'Cable crunch' AND m.key IN ('weight','reps'))
          OR (e.name = 'Angled leg press machine' AND m.key IN ('weight','reps'))
          OR (e.name = 'Outer thigh machine' AND m.key IN ('weight','reps'))
          OR (e.name = 'Inner thigh machine' AND m.key IN ('weight','reps'))
          OR (e.name = 'Prone leg curl machine' AND m.key IN ('weight','reps'))
          OR (e.name = 'Long lever plank' AND m.key IN ('duration'))
          OR (e.name = 'Treadmill' AND m.key IN ('duration','distance','speed'))
          OR (e.name = 'Rowing Machine' AND m.key IN ('stroke_rate','distance','duration'))
        );
    

  04_demoDataV2.sql: |
    -- 1. Create demo user
    INSERT INTO users (username, email, goal, password_hash)
    VALUES ('demo_user', 'demo@example.com', 'Build strength and consistency', '$2b$10$example_hash')
    RETURNING id;
    
    
    
    -- Dec 23
    -- 2. Insert a workout and capture its ID
    WITH workout_insert AS (
        INSERT INTO workouts (workout_date, user_id, workout_kind)
        VALUES ('2025-12-23', 1, 'strength')
        RETURNING id AS workout_id
    )
    
    -- 3. Add workout_exercises for the first workout
    INSERT INTO workout_exercises (workout_id, exercise_id, note)
    SELECT 1 AS workout_id, e.id AS exercise_id, NULL AS note
    FROM exercises e
    WHERE e.is_global = TRUE
      AND e.name IN (
        'Cable row',
        'Dumbbell Hammer curls',
        'Dumbbell flat bench press',
        'Biceps curl machine',
        'Cable triceps push down',
        'Dumbbell Incline bench',
        'Cable lat raise',
        'Cable kneeling crunch'
      )
    RETURNING id, exercise_id;
    
    -- 4. Insert 3 entries per workout_exercise
    WITH entries_insert AS (
        SELECT we.id AS workout_exercise_id, gs.entry_index
        FROM workout_exercises we
        CROSS JOIN (VALUES (1), (2), (3)) AS gs(entry_index)
    )
    INSERT INTO entries (workout_exercise_id, entry_index)
    SELECT workout_exercise_id, entry_index
    FROM entries_insert
    RETURNING id, workout_exercise_id, entry_index;
    
    -- 5. insert entry metrics
    -- Insert entry metrics (weight and reps) for Dec 23, 2025
    WITH metric_ids AS (
        SELECT id AS metric_id, key
        FROM metric_definitions
        WHERE is_global = TRUE
          AND key IN ('weight', 'reps')
    ),
    entry_values AS (
        -- Map each exercise's entries to the weight/reps for each set
        SELECT e.id AS entry_id, we.exercise_id, e.entry_index,
               CASE 
                   WHEN ex.name = 'Cable row' THEN 120
                   WHEN ex.name = 'Dumbbell Hammer curls' THEN 30
                   WHEN ex.name = 'Dumbbell flat bench press' THEN 55
                   WHEN ex.name = 'Biceps curl machine' AND e.entry_index = 1 THEN 60
                   WHEN ex.name = 'Biceps curl machine' AND e.entry_index IN (2,3) THEN 65
                   WHEN ex.name = 'Cable triceps push down' THEN 110
                   WHEN ex.name = 'Dumbbell Incline bench' AND e.entry_index = 1 THEN 40
                   WHEN ex.name = 'Dumbbell Incline bench' AND e.entry_index IN (2,3) THEN 45
                   WHEN ex.name = 'Cable lat raise' THEN 15
                   WHEN ex.name = 'Cable kneeling crunch' THEN 120
               END AS weight,
               CASE
                   WHEN ex.name = 'Cable row' AND e.entry_index = 1 THEN 10
                   WHEN ex.name = 'Cable row' AND e.entry_index = 2 THEN 12
                   WHEN ex.name = 'Cable row' AND e.entry_index = 3 THEN 12
                   WHEN ex.name = 'Dumbbell Hammer curls' AND e.entry_index = 1 THEN 7
                   WHEN ex.name = 'Dumbbell Hammer curls' AND e.entry_index = 2 THEN 8
                   WHEN ex.name = 'Dumbbell Hammer curls' AND e.entry_index = 3 THEN 7
                   WHEN ex.name = 'Dumbbell flat bench press' AND e.entry_index = 1 THEN 10
                   WHEN ex.name = 'Dumbbell flat bench press' AND e.entry_index = 2 THEN 9
                   WHEN ex.name = 'Dumbbell flat bench press' AND e.entry_index = 3 THEN 7
                   WHEN ex.name = 'Biceps curl machine' AND e.entry_index = 1 THEN 12
                   WHEN ex.name = 'Biceps curl machine' AND e.entry_index = 2 THEN 10
                   WHEN ex.name = 'Biceps curl machine' AND e.entry_index = 3 THEN 8
                   WHEN ex.name = 'Cable triceps push down' AND e.entry_index = 1 THEN 12
                   WHEN ex.name = 'Cable triceps push down' AND e.entry_index = 2 THEN 9
                   WHEN ex.name = 'Cable triceps push down' AND e.entry_index = 3 THEN 6
                   WHEN ex.name = 'Dumbbell Incline bench' AND e.entry_index = 1 THEN 10
                   WHEN ex.name = 'Dumbbell Incline bench' AND e.entry_index = 2 THEN 9
                   WHEN ex.name = 'Dumbbell Incline bench' AND e.entry_index = 3 THEN 8
                   WHEN ex.name = 'Cable lat raise' THEN 10
                   WHEN ex.name = 'Cable kneeling crunch' THEN 20
               END AS reps
        FROM entries e
        JOIN workout_exercises we ON e.workout_exercise_id = we.id
        JOIN exercises ex ON we.exercise_id = ex.id
    )
    INSERT INTO entry_metrics (entry_id, metric_id, value_number)
    SELECT ev.entry_id, m.metric_id,
           CASE 
               WHEN m.key = 'weight' THEN ev.weight
               WHEN m.key = 'reps' THEN ev.reps
           END
    FROM entry_values ev
    CROSS JOIN metric_ids m
    WHERE (m.key = 'weight' AND ev.weight IS NOT NULL)
       OR (m.key = 'reps' AND ev.reps IS NOT NULL)
    RETURNING entry_id, metric_id, value_number;
    
    
    

