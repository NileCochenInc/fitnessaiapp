apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-tool
  namespace: fitnessapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-tool
  template:
    metadata:
      labels:
        app: data-tool
    spec:
      containers:
        - name: data-tool
          image: fitnessaiapp-data-tool:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: fitnessapp-config
                  key: POSTGRES_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: fitnessapp-config
                  key: POSTGRES_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: fitnessapp-config
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: fitnessapp-config
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fitnessapp-secret
                  key: POSTGRES_PASSWORD
            - name: SERVER_PORT
              value: "8080"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
