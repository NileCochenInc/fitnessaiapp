apiVersion: v1
kind: Secret
metadata:
  name: fitnessapp-secret
  namespace: fitnessapp
type: Opaque
data:
  # All values must be base64 encoded: echo -n 'value' | base64
  POSTGRES_PASSWORD: <base64-encoded-password>
  NEXTAUTH_SECRET: <base64-encoded-secret>
  GOOGLE_CLIENT_SECRET: <base64-encoded-google-secret>
  MISTRAL_API_KEY: <base64-encoded-mistral-key>
  GrafanaSettings__ApiToken: <base64-encoded-grafana-token>
  DATABASE_URL: <base64-encoded-database-url>
